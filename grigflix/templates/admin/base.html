<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Grigflix Admin{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="admin-shell">
        <aside class="admin-sidebar">
            <div class="brand">Grig<span>flix</span></div>
            <nav>
                <a href="/admin/movies" class="{% if active == 'movies' %}active{% endif %}">🎬 Filmes</a>
                <a href="/admin/users" class="{% if active == 'users' %}active{% endif %}">👤 Usuários</a>
            </nav>
            <div class="sidebar-footer">
                <span>{{ username }}</span>
                <a href="/logout" class="logout-link">Sair</a>
            </div>
        </aside>
        <main class="admin-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
