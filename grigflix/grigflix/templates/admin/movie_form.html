{% extends "admin/base.html" %}
{% block title %}{% if filme %}Editar filme{% else %}Novo filme{% endif %} · Grigflix Admin{% endblock %}
{% block content %}
    <div class="content-header">
        <h1>{% if filme %}Editar filme{% else %}Novo filme{% endif %}</h1>
        <a href="/admin/movies" class="btn-secondary">&larr; Voltar</a>
    </div>

    <form method="post" action="{% if filme %}/admin/movies/{{ filme.id }}/edit{% else %}/admin/movies/new{% endif %}" class="admin-form">
        <label>Título
            <input type="text" name="title" value="{{ filme.title if filme else '' }}" required>
        </label>

        <label>Sinopse
            <textarea name="synopsis" rows="4">{{ filme.synopsis if filme else '' }}</textarea>
        </label>

        <div class="form-row">
            <label>Categoria
                <input type="text" name="category" value="{{ filme.category if filme else '' }}" placeholder="Ação, Drama, Comédia...">
            </label>
            <label>Ano
                <input type="number" name="year" value="{{ filme.year if filme else '' }}" min="1900" max="2100">
            </label>
        </div>

        <label>URL da capa
            <input type="url" name="cover_url" value="{{ filme.cover_url if filme else '' }}" placeholder="https://...">
        </label>

        <label>URL do vídeo
            <input type="text" name="video_url" value="{{ filme.video_url if filme else '' }}" placeholder="Link do vídeo (fonte com direitos autorizados)">
        </label>

        <button type="submit" class="btn-primary">Salvar</button>
    </form>
{% endblock %}
